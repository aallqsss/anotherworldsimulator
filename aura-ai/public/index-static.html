<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura AI - Advanced Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <!-- Main Chat Screen -->
    <div id="chat-screen" class="screen">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo-small">
            <svg viewBox="0 0 40 40" fill="none">
              <circle cx="20" cy="20" r="18" stroke="url(#gradient2)" stroke-width="2"/>
              <path d="M14 20C14 16.6863 16.6863 14 20 14C23.3137 14 26 16.6863 26 20" stroke="url(#gradient2)" stroke-width="2" stroke-linecap="round"/>
              <circle cx="20" cy="24" r="3" fill="url(#gradient2)"/>
              <defs>
                <linearGradient id="gradient2" x1="0" y1="0" x2="40" y2="40">
                  <stop offset="0%" stop-color="#8B5CF6"/>
                  <stop offset="100%" stop-color="#EC4899"/>
                </linearGradient>
              </defs>
            </svg>
            <span>Aura</span>
          </div>
          <button id="new-chat-btn" class="btn-icon" title="Nuova chat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
          </button>
        </div>
        
        <div class="chat-list" id="chat-list">
        </div>
        
        <div class="sidebar-footer">
          <button id="settings-btn" class="btn-ghost">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span>Impostazioni</span>
          </button>
          <button id="logout-btn" class="btn-ghost">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span>Esci</span>
          </button>
        </div>
      </aside>
      
      <!-- Main Content -->
      <main class="main-content">
        <div class="chat-header">
          <h2 id="current-chat-title">Nuova conversazione</h2>
        </div>
        
        <div class="messages-container" id="messages-container">
          <div class="welcome-message" id="welcome-message">
            <div class="welcome-icon">
              <svg viewBox="0 0 60 60" fill="none">
                <circle cx="30" cy="30" r="25" stroke="url(#gradient3)" stroke-width="1.5" opacity="0.3"/>
                <circle cx="30" cy="30" r="18" stroke="url(#gradient3)" stroke-width="1.5" opacity="0.5"/>
                <path d="M22 30C22 26.6863 24.6863 24 28 24C31.3137 24 34 26.6863 34 30" stroke="url(#gradient3)" stroke-width="2" stroke-linecap="round"/>
                <circle cx="30" cy="35" r="4" fill="url(#gradient3)"/>
                <defs>
                  <linearGradient id="gradient3" x1="0" y1="0" x2="60" y2="60">
                    <stop offset="0%" stop-color="#8B5CF6"/>
                    <stop offset="100%" stop-color="#EC4899"/>
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <h3>Come posso aiutarti oggi?</h3>
            <p>Inizia una nuova conversazione con Aura AI</p>
          </div>
          <div id="messages" class="messages"></div>
        </div>
        
        <div class="input-container">
          <div class="input-wrapper">
            <textarea id="message-input" placeholder="Scrivi un messaggio..." rows="1"></textarea>
            <button id="send-btn" class="btn-send" disabled>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 2L11 13"/>
                <path d="M22 2L15 22L11 13L2 9L22 2Z"/>
              </svg>
            </button>
            <button id="stop-btn" class="btn-stop hidden">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="6" width="12" height="12" rx="2"/>
              </svg>
            </button>
          </div>
          <p class="input-hint">Aura AI può commettere errori. Verifica le informazioni importanti.</p>
        </div>
      </main>
    </div>
    
    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3>Impostazioni</h3>
          <button class="btn-close" id="close-settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label>API Key Groq (opzionale)</label>
            <input type="password" id="openai-key" placeholder="gsk_...">
            <p class="setting-hint">Inserisci la tua chiave API (inizia con gsk_)</p>
          </div>
          <div class="setting-group">
            <label>Tema</label>
            <select id="theme-select">
              <option value="dark">Scuro</option>
              <option value="light">Chiaro</option>
              <option value="system">Sistema</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="save-settings">Salva</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="js/app-static.js"></script>
</body>
</html>
