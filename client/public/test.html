<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Another World - Test</title>
  <style>
    body {
      background-color: #0a0e1a;
      color: #e5e5e5;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background-color: #111827;
      padding: 30px;
      border-radius: 10px;
      border: 2px solid #e63946;
      text-align: center;
    }
    h1 {
      color: #ffd700;
      font-size: 24px;
      margin-bottom: 10px;
    }
    h2 {
      color: #9ca3af;
      font-size: 14px;
      margin-bottom: 30px;
    }
    input {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      background: #0a0e1a;
      border: 1px solid #4b5563;
      color: white;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>ANOTHER WORLD</h1>
    <h2>SIMULATOR</h2>
    <form>
      <input type="text" placeholder="Username">
      <input type="password" placeholder="Password">
      <button type="button">LOGIN</button>
    </form>
  </div>
</body>
</html>
